{% extends 'inc/book.html' %}
{% load static %}

{% block text %}
    <h1 class = "custom-title-form">Réservez dès maintenant !</h1>
    <p style = "margin-left: 7rem;" id = "text-warning">Veuillez remplir les champs d'information ci-après</p>              
{% endblock %}

{% block form %}
<form class = "mx-3 custom-form" autocomplete="off">
    <div class = "d-flex flex-row">
        <div>
            <label for="nomClient">Nom</label>
            <input type="text" name="nomClient" id="nomClient" class = "form-control" style = "width : 110%;">
        </div>
        <div class = "ms-5">
            <label for="prenomClient">Prénom</label>
            <input type="text" name="prenomClient" id="prenomClient" class = "form-control" style = "width : 135%;">
        </div>
    </div>

    <div class = "d-flex flex-row mt-3">
        <div>
            <label for="ageClient">Age</label>
            <input type="text" name="ageClient" id="ageClient" class = "form-control" style = "width : 110%;">
        </div>
        <div class = "ms-5">
            <label for="contactClient">Numéro de téléphone</label>
            <input type="text" name="contactClient" id="contactClient" class = "form-control" style = "width : 135%;">
        </div>
    </div>

    <div class = "d-flex flex-row mt-3">
        <div>
            <label for="emailClient">Adresse e-mail</label>
            <input type="email" name="emailClient" id="emailClient" class = "form-control" style = "width : 110%;">
        </div>
        <div class = "ms-5">
            <label for="nbReservant">Nombre de réservants</label>
            <input type="text" name="nbReservant" id="nbReservant" class = "form-control" style = "width : 135%;">
        </div>
    </div>

    <div class = "d-flex flex-row mt-5 custom-btn-group ms-2">
        <a href="{% url 'explore' %}" class = "btn bg-gray-explore w-100 py-2">Retour</a>
        <button type="submit" class = "btn bg-yellow w-100 ms-5 py-2" id = "btnSubmitInfo">Suivant</button>
    </div>
</form>
{% endblock %}
