version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: circus_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: circus_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template
      - ./docker/start.sh:/start.sh
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
